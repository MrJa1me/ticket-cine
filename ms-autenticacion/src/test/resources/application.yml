spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:autenticacion;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect

# Evitar registro en Eureka durante tests (si aplica)
eureka:
  client:
    register-with-eureka: false
    fetch-registry: false

# Propiedades necesarias para JwtService durante los tests
jwt:
  secret: VGhpcyBpcyBhIHZlcnkgc2VjdXJlIHNlY3JldCBmb3IganN3dCB0b2tlbg==
  expiration: 3600000
