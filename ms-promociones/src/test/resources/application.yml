spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:promociones-test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false
