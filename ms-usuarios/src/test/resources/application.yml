spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:usuarios;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect

# Evitar registro en Eureka durante tests
eureka:
  client:
    register-with-eureka: false
    fetch-registry: false
